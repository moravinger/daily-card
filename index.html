<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Daily Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Helvetica Neue', sans-serif;
        background-color: #0d0d0d;
        color: #fff;
        height: 100vh;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      #loading {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #fff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      #card-container {
        width: 100%;
        max-width: 100%;
        display: none;
      }

      #card-image {
        width: 100%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 8px;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
      }

      #card-caption {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        color: #aaa;
      }

      #placeholder {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        text-align: center;
      }

      #fallback-image {
        width: 100px;
        height: 100px;
        opacity: 0.5;
      }

      #placeholder-text {
        font-size: 18px;
        color: #999;
      }

      #error {
        display: none;
        color: #f44336;
        font-size: 14px;
        margin-top: 16px;
        text-align: center;
      }

      #admin-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.95);
        padding: 20px;
        border-top: 1px solid #333;
        max-height: 50vh;
        overflow-y: auto;
        display: none;
      }

      #admin-panel.visible {
        display: block;
      }

      #upload-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #upload-form input,
      #upload-form button {
        padding: 12px;
        border: 1px solid #444;
        background: #1a1a1a;
        color: #fff;
        border-radius: 4px;
        font-size: 14px;
      }

      #upload-form input[type='file'] {
        cursor: pointer;
      }

      #upload-form button {
        background: #007AFF;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
      }

      #upload-form button:hover {
        background: #0051cc;
      }

      #upload-form button:active {
        background: #003d99;
      }

      #upload-status {
        display: none;
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <div class="spinner"></div>
      </div>

      <div id="card-container" style="display: none">
        <img id="card-image" alt="Daily Card" />
        <p id="card-caption"></p>
      </div>

      <div id="placeholder" style="display: none">
        <img id="fallback-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23333' width='100' height='100'/%3E%3Ctext x='50' y='50' font-size='40' fill='%23666' text-anchor='middle' dominant-baseline='middle'%3E📷%3C/text%3E%3C/svg%3E" />
        <p id="placeholder-text">Новая карточка готовится, загляните позже</p>
      </div>

      <div id="error"></div>
    </div>

    <div id="admin-panel">
      <h3 style="margin-bottom: 12px">Админ-панель</h3>
      <form id="upload-form">
        <input type="file" id="file-input" accept="image/*" required />
        <input type="date" id="date-input" required />
        <input type="text" id="caption-input" placeholder="Подпись (опционально)" />
        <button type="submit">Загрузить карточку</button>
      </form>
      <div id="upload-status"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
