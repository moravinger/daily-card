<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Daily Card</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Loading spinner -->
      <div id="loading">
        <div class="spinner"></div>
      </div>

      <!-- Card container -->
      <div id="card-container" style="display: none">
        <img id="card-image" alt="Daily Card" />
        <p id="card-caption"></p>
      </div>

      <!-- Placeholder -->
      <div id="placeholder" style="display: none">
        <img id="fallback-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23333' width='100' height='100'/%3E%3Ctext x='50' y='50' font-size='40' fill='%23666' text-anchor='middle' dominant-baseline='middle'%3E📷%3C/text%3E%3C/svg%3E" />
        <p id="placeholder-text">Новая карточка готовится, загляните позже</p>
      </div>

      <!-- Error message -->
      <div id="error"></div>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel">
      <h3 style="margin-bottom: 12px">Админ-панель</h3>
      <form id="upload-form">
        <input type="file" id="file-input" accept="image/*" required />
        <input type="date" id="date-input" required />
        <input type="text" id="caption-input" placeholder="Подпись (опционально)" />
        <button type="submit">Загрузить карточку</button>
      </form>
      <div id="upload-status"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
